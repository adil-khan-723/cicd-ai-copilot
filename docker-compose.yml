# Docker Compose — DevOps AI Agent
# Stub for Phase 5. Fills out incrementally.
# Usage: docker-compose up

version: "3.9"

services:
  webhook:
    build: .
    ports:
      - "${WEBHOOK_PORT:-8000}:8000"
    env_file: .env
    command: uvicorn webhook.server:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  slack-bot:
    build: .
    env_file: .env
    command: python -m slack.bot
    depends_on:
      - webhook
    restart: unless-stopped

  # Optional Redis cache — uncomment when REDIS_URL is set
