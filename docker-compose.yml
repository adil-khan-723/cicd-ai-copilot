# Docker Compose — DevOps AI Agent
#
# Dev  (hot-reload, mounts source):  docker compose up
# Prod (built image, no mount):      docker compose -f docker-compose.yml -f docker-compose.prod.yml up
#
# Prerequisites:
#   cp .env.example .env  # fill in tokens
#   docker compose up
#
# Data directory (profiles, audit log):
#   Default: a named docker volume `devops_ai_data`
#   Override with absolute host path: DATA_DIR=/abs/path in .env
#   (Do NOT use ~ — compose env interpolation does not expand it.)
#
# Linux native Docker users: extra_hosts maps host.docker.internal to the host
# automatically. Docker Desktop (Mac/Win) ignores this since it already provides it.

services:
  webhook:
    build: .
    ports:
      - "${WEBHOOK_PORT:-8000}:8000"
    env_file: .env
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL_DOCKER:-http://host.docker.internal:11434}
      JENKINS_URL: ${JENKINS_URL_DOCKER:-http://host.docker.internal:8080}
      WEBHOOK_HOST: "0.0.0.0"
      REDIS_URL: "redis://redis:6379"
      DATA_DIR: "/data"
    extra_hosts:
      # No-op on Docker Desktop (already provided), required on Linux native Docker
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn webhook.server:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app                      # live source mount for --reload
      - ${DATA_DIR:-devops_ai_data}:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      # Configurable so multiple stacks can coexist on the same host
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  redis_data:
  devops_ai_data:
