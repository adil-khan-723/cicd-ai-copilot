# Docker Compose — DevOps AI Agent
# Usage: docker-compose up
# For local dev with Ollama: ensure Ollama is running on the host first.

services:
  webhook:
    build: .
    ports:
      - "${WEBHOOK_PORT:-8000}:8000"
    env_file: .env
    environment:
      # Allow container to reach host Ollama on macOS/Windows
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    command: uvicorn webhook.server:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - audit_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  slack-bot:
    build: .
    env_file: .env
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    command: python -m slack.bot
    volumes:
      - .:/app
      - audit_logs:/app/logs
    depends_on:
      webhook:
        condition: service_healthy
    restart: unless-stopped

  # Optional Redis cache — uncomment when REDIS_URL is set in .env
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   restart: unless-stopped

volumes:
  audit_logs:
  # redis_data:
