# Docker Compose — DevOps AI Agent
#
# Dev  (hot-reload, mounts source):  docker-compose up
# Prod (built image, no mount):      docker-compose -f docker-compose.yml -f docker-compose.prod.yml up
#
# Prerequisites:
#   cp .env.example .env  # fill in tokens
#   docker-compose up

services:
  webhook:
    build: .
    ports:
      - "${WEBHOOK_PORT:-8000}:8000"
    env_file: .env
    environment:
      # Override localhost URLs so containers reach the host machine (Mac/Windows)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL_DOCKER:-http://host.docker.internal:11434}
      JENKINS_URL: ${JENKINS_URL_DOCKER:-http://host.docker.internal:8080}
      WEBHOOK_HOST: "0.0.0.0"
    command: uvicorn webhook.server:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app                      # live source mount for --reload
      - audit_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Optional Redis cache — uncomment when REDIS_URL is set in .env
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   restart: unless-stopped

volumes:
  audit_logs:
  # redis_data:
